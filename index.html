<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spoogle Tab Browser</title>
<style>
  body { margin: 0; font-family: Arial, sans-serif; }
  .tab-bar { display: flex; background: #333; padding: 5px; gap: 5px; }
  .tab-bar button { padding: 5px 10px; cursor: pointer; color: white; background: #555; border: none; border-radius: 4px; }
  .tab-bar button.active { background: #ffcc00; color: black; }
  #tabs-container { width: 100%; height: calc(100vh - 40px); position: relative; }
  iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; display: none; }
</style>
</head>
<body>

<div class="tab-bar">
  <button id="new-tab-btn">➕ New Tab</button>
  <div id="tabs-buttons"></div>
</div>

<div id="tabs-container"></div>

<script>
let tabCounter = 0;
let tabs = {};

const tabsButtons = document.getElementById('tabs-buttons');
const tabsContainer = document.getElementById('tabs-container');
const newTabBtn = document.getElementById('new-tab-btn');

// Function to create a new tab
function createTab(url = 'https://spoogle-search.github.io/edit/main.html') {
  tabCounter++;
  const tabId = 'tab-' + tabCounter;

  // Create tab button
  const btn = document.createElement('button');
  btn.textContent = 'Tab ' + tabCounter;
  btn.id = tabId + '-btn';
  btn.onclick = () => switchTab(tabId);
  tabsButtons.appendChild(btn);

  // Create iframe
  const iframe = document.createElement('iframe');
  iframe.src = url;
  iframe.id = tabId;
  tabsContainer.appendChild(iframe);

  tabs[tabId] = { btn, iframe };
  switchTab(tabId);

  // Intercept links in this iframe
  iframe.onload = () => interceptLinks(iframe);
}

// Switch visible tab
function switchTab(tabId) {
  for (let id in tabs) {
    tabs[id].iframe.style.display = 'none';
    tabs[id].btn.classList.remove('active');
  }
  tabs[tabId].iframe.style.display = 'block';
  tabs[tabId].btn.classList.add('active');
}

// Intercept links inside an iframe
function interceptLinks(iframe) {
  try {
    const doc = iframe.contentDocument || iframe.contentWindow.document;
    const links = doc.querySelectorAll('a');
    links.forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const href = link.getAttribute('href');
        if (href) createTab(href); // Open in new internal tab
      });
    });
  } catch(err) {
    // Cross-origin links cannot be intercepted
  }
}

// New tab button
newTabBtn.onclick = () => createTab();

// Start with initial tab loading main.html
createTab('https://spoogle-search.github.io/edit/main.html');
</script>

</body>
</html>
