<!DOCTYPE html>
<html>
<head>
  <title>SPOOGLE SAFE NEON 🌊✨</title>
  <style>
    body { margin: 0; overflow: hidden; background: #001018; }
    canvas { display: block; }
  </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// 🌊 SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x001018);

// 🎥 CAMERA
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 1.5, 7);

// 🎮 RENDERER
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// 💡 LIGHTS
scene.add(new THREE.AmbientLight(0x88ccff, 0.6));

const light = new THREE.PointLight(0xffffff, 1.5);
light.position.set(3, 3, 3);
scene.add(light);

// 🌊 GROUP
const logoGroup = new THREE.Group();
scene.add(logoGroup);

// 🧽 FALLBACK (always visible)
const fallback = new THREE.Mesh(
  new THREE.BoxGeometry(2, 1, 0.5),
  new THREE.MeshStandardMaterial({
    color: 0x00aaff,
    emissive: 0x003344,
    emissiveIntensity: 0.5
  })
);
logoGroup.add(fallback);

// 🌟 LOAD IMAGE
const loader = new THREE.TextureLoader();

loader.load(
  "Spoogle.png",

  (texture) => {

    console.log("✅ Loaded");

    logoGroup.remove(fallback);

    const baseMaterial = new THREE.MeshStandardMaterial({
      map: texture,
      transparent: true,
      emissive: new THREE.Color(0xffffff),
      emissiveIntensity: 1.2,
      metalness: 0.3,
      roughness: 0.4
    });

    const main = new THREE.Mesh(
      new THREE.PlaneGeometry(7, 3.5),
      baseMaterial
    );

    logoGroup.add(main);

    // 🌈 SAMPLE COLOR FOR LIGHT
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");
    canvas.width = 64;
    canvas.height = 64;

    ctx.drawImage(texture.image, 0, 0, 64, 64);

    const data = ctx.getImageData(0, 0, 64, 64).data;

    let r=0,g=0,b=0,count=0;

    for (let i = 0; i < data.length; i += 4) {
      r += data[i];
      g += data[i+1];
      b += data[i+2];
      count++;
    }

    const glowColor = new THREE.Color(
      r/count/255,
      g/count/255,
      b/count/255
    );

    light.color = glowColor;

    // 🌟 CREATE FAKE BLOOM LAYERS
    for (let i = 0; i < 3; i++) {
      const glow = new THREE.Mesh(
        new THREE.PlaneGeometry(7 + i*0.3, 3.5 + i*0.3),
        new THREE.MeshBasicMaterial({
          map: texture,
          transparent: true,
          opacity: 0.15 - i*0.04,
          blending: THREE.AdditiveBlending
        })
      );

      logoGroup.add(glow);
    }

  },

  undefined,
  (err) => console.error("❌ Load failed:", err)
);

// 🫧 BUBBLES
const bubbles = [];

for (let i = 0; i < 60; i++) {
  const b = new THREE.Mesh(
    new THREE.SphereGeometry(0.07, 8, 8),
    new THREE.MeshStandardMaterial({
      color: 0x99ddff,
      transparent: true,
      opacity: 0.5
    })
  );

  b.position.set(
    (Math.random() - 0.5) * 10,
    Math.random() * 5,
    (Math.random() - 0.5) * 6
  );

  scene.add(b);
  bubbles.push(b);
}

// 🖱️ CONTROL
let mx = 0, my = 0;

document.addEventListener("mousemove", (e) => {
  mx = (e.clientX / innerWidth - 0.5) * 2;
  my = (e.clientY / innerHeight - 0.5) * 2;
});

// 🔁 LOOP
function animate() {
  requestAnimationFrame(animate);

  camera.position.x += (mx * 2 - camera.position.x) * 0.05;
  camera.position.y += (-my * 1.5 - camera.position.y) * 0.05;
  camera.lookAt(0, 0, 0);

  logoGroup.position.y = Math.sin(Date.now() * 0.002) * 0.3;

  bubbles.forEach(b => {
    b.position.y += 0.01;
    if (b.position.y > 5) b.position.y = -2;
  });

  renderer.render(scene, camera);
}

animate();

window.addEventListener("resize", () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

</script>

</body>
</html>
