<!DOCTYPE html>
<html>
<head>
  <title>SPOOGLE 3D Logo 🌊</title>
  <style>
    body { margin: 0; overflow: hidden; background: #001a22; }
    canvas { display: block; }

    #hint {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-family: sans-serif;
      opacity: 0.7;
    }
  </style>
</head>
<body>

<div id="hint">Place "spoogle.png" in the same folder as this file 🌊</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// 🌊 Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x001a22);

// 🎥 Camera
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.set(0, 0, 8);

// 🎮 Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// 💡 Lights (important for glow feel)
const ambient = new THREE.AmbientLight(0x66ccff, 0.6);
scene.add(ambient);

const light = new THREE.PointLight(0x00aaff, 2);
light.position.set(5, 5, 5);
scene.add(light);

// 🌊 Underwater fog glow feel
scene.fog = new THREE.Fog(0x001a22, 5, 20);

// 🌟 SPOOGLE LOGO (IMAGE)
const loader = new THREE.TextureLoader();

let logo;

loader.load(
  "spoogle.png", // 👈 YOUR IMAGE HERE
  (texture) => {

    const geometry = new THREE.PlaneGeometry(5, 3);

    const material = new THREE.MeshStandardMaterial({
      map: texture,
      transparent: true,

      // 💡 fake glow effect
      emissive: new THREE.Color(0x00aaff),
      emissiveIntensity: 1,
      metalness: 0.2,
      roughness: 0.3
    });

    logo = new THREE.Mesh(geometry, material);

    scene.add(logo);
  }
);

// 🫧 FLOATING PARTICLES (ocean vibe)
const bubbles = [];

for (let i = 0; i < 60; i++) {
  const bubble = new THREE.Mesh(
    new THREE.SphereGeometry(0.1, 8, 8),
    new THREE.MeshStandardMaterial({
      color: 0x99ddff,
      transparent: true,
      opacity: 0.4
    })
  );

  bubble.position.set(
    (Math.random() - 0.5) * 20,
    (Math.random() - 0.5) * 10,
    (Math.random() - 0.5) * 10
  );

  scene.add(bubble);
  bubbles.push(bubble);
}

// 🖱️ Mouse camera movement
let mx = 0, my = 0;

document.addEventListener("mousemove", (e) => {
  mx = (e.clientX / window.innerWidth - 0.5) * 2;
  my = (e.clientY / window.innerHeight - 0.5) * 2;
});

// 🔁 Animation loop
function animate() {
  requestAnimationFrame(animate);

  // camera drift
  camera.position.x += (mx * 2 - camera.position.x) * 0.05;
  camera.position.y += (-my * 2 - camera.position.y) * 0.05;
  camera.lookAt(0, 0, 0);

  // 🌊 float logo gently
  if (logo) {
    logo.position.y = Math.sin(Date.now() * 0.002) * 0.3;
    logo.rotation.y = Math.sin(Date.now() * 0.001) * 0.2;
  }

  // 🫧 bubbles move upward
  bubbles.forEach(b => {
    b.position.y += 0.01;
    if (b.position.y > 5) b.position.y = -5;
  });

  renderer.render(scene, camera);
}

animate();

// 📱 resize fix
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
