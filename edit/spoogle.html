<!DOCTYPE html>
<html>
<head>
  <title>SPOOGLE START 🌊✨</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #001a22;
    }

    #hint {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-family: sans-serif;
      opacity: 0.7;
      z-index: 10;
    }

    #loading {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffd27a;
      font-family: sans-serif;
      font-size: 16px;
      opacity: 0.8;
      z-index: 10;
    }
  </style>
</head>
<body>

<div id="hint">SPOOGLE is starting... 🌊</div>
<div id="loading">Entering underwater search world...</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// 🌊 SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x001a22);

// 🎥 CAMERA
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 1.5, 6);

// 🎮 RENDERER
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// 💡 LIGHTS
scene.add(new THREE.AmbientLight(0xffe3b0, 0.6));

const light = new THREE.PointLight(0xffd27a, 2);
light.position.set(3, 3, 3);
scene.add(light);

// 🌊 LOGO GROUP
const logoGroup = new THREE.Group();
scene.add(logoGroup);

// 🟡 SPOOGLE IMAGE
const loader = new THREE.TextureLoader();

loader.load("Spoogle.png", (texture) => {

  texture.colorSpace = THREE.SRGBColorSpace;

  const mat = new THREE.MeshStandardMaterial({
    map: texture,
    emissive: new THREE.Color(0xffd27a), // 🌟 warm yellow
    emissiveIntensity: 0.4,
    roughness: 0.9
  });

  const mesh = new THREE.Mesh(
    new THREE.PlaneGeometry(5, 2.5),
    mat
  );

  logoGroup.add(mesh);
});

// 🫧 PARTICLES (simple floating bubbles)
const particles = [];

const particleGeo = new THREE.SphereGeometry(0.05, 6, 6);
const particleMat = new THREE.MeshBasicMaterial({
  color: 0xfff1c1,
  transparent: true,
  opacity: 0.6
});

for (let i = 0; i < 80; i++) {
  const p = new THREE.Mesh(particleGeo, particleMat);

  p.position.set(
    (Math.random() - 0.5) * 12,
    Math.random() * 6,
    (Math.random() - 0.5) * 6
  );

  scene.add(p);
  particles.push(p);
}

// 🖱️ mouse movement
let mx = 0, my = 0;

document.addEventListener("mousemove", (e) => {
  mx = (e.clientX / innerWidth - 0.5) * 2;
  my = (e.clientY / innerHeight - 0.5) * 2;
});

// ⏱️ AUTO REDIRECT (after 5 seconds)
setTimeout(() => {
  window.location.href = "https://spongebob-fan.w3spaces.com";
}, 5000);

// 🔁 LOOP
function animate() {
  requestAnimationFrame(animate);

  camera.position.x += (mx * 2 - camera.position.x) * 0.05;
  camera.position.y += (-my * 1.5 - camera.position.y) * 0.05;
  camera.lookAt(0, 0, 0);

  // 🌊 floating logo
  logoGroup.position.y = Math.sin(Date.now() * 0.002) * 0.3;

  // 🫧 particle motion
  particles.forEach(p => {
    p.position.y += 0.01;
    p.position.x += Math.sin(Date.now() * 0.001 + p.position.y) * 0.002;

    if (p.position.y > 5) p.position.y = -2;
  });

  renderer.render(scene, camera);
}

animate();

// 📱 resize fix
window.addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

</script>

</body>
</html>
