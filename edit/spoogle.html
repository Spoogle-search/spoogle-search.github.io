<!DOCTYPE html>
<html>
<head>
  <title>SPOOGLE FIXED 🌊</title>
  <style>
    body { margin: 0; overflow: hidden; background: #001a22; }
    #hint {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-family: sans-serif;
      opacity: 0.7;
    }
  </style>
</head>
<body>

<div id="hint">
  Loading SPOOGLE... check console if image fails 🌊
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// 🌊 SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x001a22);

// 🎥 CAMERA
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 1.5, 6);

// 🎮 RENDERER
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// 💡 LIGHTS (safe setup)
scene.add(new THREE.AmbientLight(0x88ccff, 0.8));

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 5, 5);
scene.add(light);

// 🌊 GROUP (logo container)
let logoGroup = new THREE.Group();
scene.add(logoGroup);

// 🧽 FALLBACK TEXT (always works)
let fontLoadedText;

function createFallback() {
  const geo = new THREE.BoxGeometry(2, 1, 0.5);
  const mat = new THREE.MeshStandardMaterial({
    color: 0x00aaff,
    emissive: 0x003344
  });

  const box = new THREE.Mesh(geo, mat);
  logoGroup.add(box);
}

// 🫧 BUBBLES
const bubbles = [];
for (let i = 0; i < 50; i++) {
  const b = new THREE.Mesh(
    new THREE.SphereGeometry(0.08, 8, 8),
    new THREE.MeshStandardMaterial({
      color: 0x99ddff,
      transparent: true,
      opacity: 0.4
    })
  );

  b.position.set(
    (Math.random() - 0.5) * 10,
    Math.random() * 5,
    (Math.random() - 0.5) * 6
  );

  scene.add(b);
  bubbles.push(b);
}

// 🌟 LOAD TEXTURE
const loader = new THREE.TextureLoader();

let loaded = false;

loader.load(
  "Spoogle.png",

  // ✅ SUCCESS
  (texture) => {
    console.log("✅ Spoogle.png loaded");

    const geo = new THREE.PlaneGeometry(4, 2);

    const mat = new THREE.MeshStandardMaterial({
      map: texture,
      transparent: true,
      emissive: new THREE.Color(0x00aaff),
      emissiveIntensity: 0.8
    });

    const mesh = new THREE.Mesh(geo, mat);

    logoGroup.add(mesh);
    loaded = true;
  },

  // 📦 progress
  undefined,

  // ❌ ERROR
  (err) => {
    console.error("❌ Image failed to load:", err);
    console.warn("Using fallback 3D object instead 🧽");

    createFallback();
  }
);

// 🖱️ CAMERA CONTROL
let mx = 0, my = 0;

document.addEventListener("mousemove", (e) => {
  mx = (e.clientX / innerWidth - 0.5) * 2;
  my = (e.clientY / innerHeight - 0.5) * 2;
});

// 🔁 LOOP
function animate() {
  requestAnimationFrame(animate);

  camera.position.x += (mx * 2 - camera.position.x) * 0.05;
  camera.position.y += (-my * 1.5 - camera.position.y) * 0.05;
  camera.lookAt(0, 0, 0);

  // 🌊 float logo
  logoGroup.position.y = Math.sin(Date.now() * 0.002) * 0.3;

  // 🫧 bubbles rise
  bubbles.forEach(b => {
    b.position.y += 0.01;
    if (b.position.y > 5) b.position.y = -2;
  });

  renderer.render(scene, camera);
}

animate();

// 📱 resize safe
window.addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

</script>

</body>
</html>
