<!DOCTYPE html>
<html>
<head>
  <title>SPOOGLE NEON 🌊✨</title>
  <style>
    body { margin: 0; overflow: hidden; background: #001a22; }
    canvas { display: block; }
  </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<!-- 🌟 POST PROCESSING (BLOOM) -->
<script src="https://threejs.org/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://threejs.org/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://threejs.org/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>

// 🌊 SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x001a22);
scene.fog = new THREE.Fog(0x001a22, 5, 25);

// 🎥 CAMERA
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 1.5, 8);

// 🎮 RENDERER
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ReinhardToneMapping;
document.body.appendChild(renderer.domElement);

// 💡 LIGHTS
scene.add(new THREE.AmbientLight(0x88ccff, 0.5));

const light = new THREE.PointLight(0xffffff, 2);
light.position.set(5, 5, 5);
scene.add(light);

// 🌈 BLOOM EFFECT (NEON GLOW)
const composer = new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene, camera));

const bloom = new THREE.UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight),
  1.5,   // strength
  0.4,   // radius
  0.85   // threshold
);

composer.addPass(bloom);

// 🌊 GROUP
const logoGroup = new THREE.Group();
scene.add(logoGroup);

// 🫧 BUBBLES
const bubbles = [];

for (let i = 0; i < 60; i++) {
  const b = new THREE.Mesh(
    new THREE.SphereGeometry(0.08, 8, 8),
    new THREE.MeshStandardMaterial({
      color: 0x99ddff,
      transparent: true,
      opacity: 0.4
    })
  );

  b.position.set(
    (Math.random() - 0.5) * 10,
    Math.random() * 5,
    (Math.random() - 0.5) * 6
  );

  scene.add(b);
  bubbles.push(b);
}

// 🌟 LOAD SPOOGLE IMAGE
const loader = new THREE.TextureLoader();

let glowColor = new THREE.Color(0xffffff);

loader.load("Spoogle.png", (texture) => {

  const geo = new THREE.PlaneGeometry(8, 4);

  const mat = new THREE.MeshStandardMaterial({
    map: texture,
    transparent: true,
    emissive: new THREE.Color(0xffffff),
    emissiveIntensity: 1
  });

  const mesh = new THREE.Mesh(geo, mat);
  logoGroup.add(mesh);

  // 🌈 sample image color for glow
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = 64;
  canvas.height = 64;

  ctx.drawImage(texture.image, 0, 0, 64, 64);

  const data = ctx.getImageData(0, 0, 64, 64).data;

  let r = 0, g = 0, b = 0, count = 0;

  for (let i = 0; i < data.length; i += 4) {
    r += data[i];
    g += data[i + 1];
    b += data[i + 2];
    count++;
  }

  glowColor = new THREE.Color(
    r / count / 255,
    g / count / 255,
    b / count / 255
  );

});

// 🖱️ MOUSE CAMERA
let mx = 0, my = 0;

document.addEventListener("mousemove", (e) => {
  mx = (e.clientX / innerWidth - 0.5) * 2;
  my = (e.clientY / innerHeight - 0.5) * 2;
});

// 🔁 LOOP
function animate() {
  requestAnimationFrame(animate);

  camera.position.x += (mx * 2 - camera.position.x) * 0.05;
  camera.position.y += (-my * 1.5 - camera.position.y) * 0.05;
  camera.lookAt(0, 0, 0);

  // 🌊 float logo
  logoGroup.position.y = Math.sin(Date.now() * 0.002) * 0.3;

  // 🌈 neon pulsing glow
  logoGroup.children.forEach(child => {
    if (child.material) {
      const pulse = 0.5 + Math.sin(Date.now() * 0.003) * 0.5;

      child.material.emissive = glowColor;
      child.material.emissiveIntensity = 0.5 + pulse * 1.5;
    }
  });

  // 🫧 bubbles
  bubbles.forEach(b => {
    b.position.y += 0.01;
    if (b.position.y > 5) b.position.y = -2;
  });

  // 🌟 RENDER WITH BLOOM
  composer.render();
}

animate();

// 📏 resize
window.addEventListener("resize", () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

</script>

</body>
</html>
