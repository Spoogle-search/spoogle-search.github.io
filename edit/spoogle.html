<!DOCTYPE html>
<html>
<head>
  <title>SPOOGLE PIXEL FIX 🌈</title>
  <style>
    body { margin: 0; overflow: hidden; background: #001018; }
  </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// 💡 SAFE LIGHT
scene.add(new THREE.AmbientLight(0xffffff, 1));

// 🧽 FALLBACK (ALWAYS SHOWS)
const fallback = new THREE.Mesh(
  new THREE.BoxGeometry(2, 1, 0.5),
  new THREE.MeshBasicMaterial({ color: 0x00aaff })
);
scene.add(fallback);

// 🌈 LOADER
const loader = new THREE.TextureLoader();

let mesh;
let material;

loader.load("Spoogle.png", (texture) => {

  console.log("✅ Texture loaded");

  // remove fallback
  scene.remove(fallback);

  material = new THREE.ShaderMaterial({

    uniforms: {
      uTexture: { value: texture },
      uTime: { value: 0 }
    },

    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,

    fragmentShader: `
      uniform sampler2D uTexture;
      uniform float uTime;
      varying vec2 vUv;

      void main() {

        vec4 tex = texture2D(uTexture, vUv);

        // 🧠 SAFETY: never fully disappear
        if (tex.a < 0.05) {
          discard;
        }

        // 🌈 per-pixel glow
        float pulse = 0.7 + 0.3 * sin(uTime * 2.0);

        vec3 glow = tex.rgb * pulse;

        gl_FragColor = vec4(glow, tex.a);
      }
    `,

    transparent: true
  });

  mesh = new THREE.Mesh(
    new THREE.PlaneGeometry(6, 3),
    material
  );

  scene.add(mesh);

});

// 🔁 LOOP
function animate() {
  requestAnimationFrame(animate);

  if (material) {
    material.uniforms.uTime.value += 0.02;
  }

  if (mesh) {
    mesh.position.y = Math.sin(Date.now() * 0.002) * 0.2;
  }

  renderer.render(scene, camera);
}

animate();

window.addEventListener("resize", () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

</script>

</body>
</html>
