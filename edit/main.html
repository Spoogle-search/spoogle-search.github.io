<!DOCTYPE html>
<html lang="en">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Slackey&display=swap" rel="stylesheet">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spoogle</title>

<style>
/* BODY & BACKGROUND */
.slackey-regular {
  font-family: "Slackey", sans-serif;
  font-weight: 400;
  font-style: normal;
}

body {

    margin: 0;
    background: url("background.jpg") no-repeat center center fixed;
    background-size: cover;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    position: relative;
}

body::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.25);
    z-index: 0;
}

body > * {
    position: relative;
    z-index: 1;
}

/* TOP RIGHT MENU */
.top-right-menu {
    position: absolute;
    top: 15px;
    right: 20px;
    display: flex;
    gap: 15px;
    align-items: center;
    font-size: 14px;
}

.menu-link {
    color: white;
    text-decoration: none;
    font-weight: 500;
    padding: 6px 10px;
    border-radius: 5px;
    transition: 0.2s;
}

.menu-link:hover {
    background: rgba(255,255,255,0.2);
}

/* Apps button */
.apps-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

.apps-btn:hover {
    background: #eee;
}

/* Avatar */
.account-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid white;
}

/* LOGO */
#logo img {
    width: 420px;
    max-width: 420px;
    margin-bottom: 40px;
    transition: transform 0.3s ease;
}

#logo img:hover {
    transform: scale(1.05);
}

/* SEARCH WRAPPER */
.search-wrapper {
    display: flex;
    align-items: center;
    width: 650px;
    height: 65px;
    background: white;
    border-radius: 999px;
    padding: 0 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    transition: all 0.2s ease;
}

.search-wrapper:hover {
    box-shadow: 0 6px 25px rgba(0,0,0,0.35);
}

.search-icon {
    width: 22px;
    height: 22px;
    background: url("https://cdn-icons-png.flaticon.com/512/622/622669.png") no-repeat center;
    background-size: contain;
    opacity: 0.6;
    margin-right: 15px;
}

#searchBar {
    flex: 1;
    border: none;
    font-size: 20px;
    outline: none;
}

.search-actions {
    display: flex;
    gap: 12px;
}

.icon-btn {
    border: none;
    background: none;
    font-size: 20px;
    cursor: pointer;
    opacity: 0.7;
    transition: 0.2s;
}

.icon-btn:hover {
    opacity: 1;
    transform: scale(1.15);
}

/* BIG SEARCH BUTTON */
#searchBtn {
    margin-top: 25px;
    width: 200px;
    height: 200px;
    border: none;
    background: none;
    cursor: pointer;
    transition: transform 0.2s ease;
}

#searchBtn:hover {
    transform: scale(1.1);
}

#searchBtn:active {
    transform: scale(0.95);
}

#searchBtn img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

/* SIDEBAR */
.sidebar {
    position: absolute;
    left: 15px;
    top: 80px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: rgba(255,255,255,0.9);
    padding: 12px;
    border-radius: 10px;
    border: 2px solid #ffe000; /* SpongeBob accent */
}

.sidebar-link {
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    font-weight: bold;
    color: #0055ff;
    font-size: 18px;
    padding: 6px 10px;
    border-radius: 6px;
    transition: background 0.2s;
}

.sidebar-link:hover {
    background: #ffec00;
}

.sidebar-logo {
    width: 36px;
    height: 36px;
}

/* FADE IN */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

#logo, .search-wrapper, #searchBtn {
    animation: fadeIn 0.8s ease;
}
</style>
</head>

<body class="slackey-regular">

<!-- TOP RIGHT MENU -->
<div class="top-right-menu">
    <a href="mail.html" class="menu-link">Mail</a>
    <a href="gallery.html" class="menu-link">Gallery</a>
    <div class="apps-btn" title="Spoogle Apps">⚙️</div>
    <img src="avatar.png" class="account-avatar" title="Your Account">
</div>

<!-- SIDEBAR -->
<div class="sidebar">
    <a href="docs.spoogle.html" class="sidebar-link docs-link">
        <img src="Spoogle.png" alt="Spoogle Logo" class="sidebar-logo">
        <span class="sidebar-text">Docs</span>
    </a>
    <!-- Add other sidebar links here -->
</div>

<!-- LOGO -->
<div id="logo">
    <img src="Spoogle.png" alt="Spoogle Logo">
</div>

<!-- SEARCH BAR -->
<div class="search-wrapper">
    <div class="search-icon"></div>
    <input type="text" id="searchBar" class="slackey-regular" class placeholder="Search Spoogle or type a URL">
    <div class="search-actions">
        <button class="icon-btn">🎤</button>
        <button class="icon-btn">📷</button>
    </div>
</div>

<!-- BIG SEARCH BUTTON -->
<button id="searchBtn">
    <img src="BUTTON.png" alt="Search">
</button>

<script>
function searchSite() {
    let query = document.getElementById("searchBar").value.trim();
    if (query !== "") {
        window.location.href = "search.html?q=" + encodeURIComponent(query);
    }
}

document.getElementById("searchBtn").addEventListener("click", searchSite);
document.getElementById("searchBar").addEventListener("keypress", function(e) {
    if (e.key === "Enter") { searchSite(); }
});
</script>

</body>
</html>
