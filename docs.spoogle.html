<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spoogle Docs</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Slackey&display=swap');

/* --- Krabby Patty Font --- */
@font-face {
    src: url('KrabbyPatty.ttf') format('truetype');
}

.slackey-regular {
  font-family: "Slackey", sans-serif;
}

/* --- BODY --- */
body {
  background: url("background.jpg") no-repeat center center fixed;
}

body::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(255, 255, 0, 0.15);
    z-index: 0;
}

body > * { position: relative; z-index: 1; }

/* --- TOP BAR --- */
.top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(90deg, #ffec00, #ffe000);
    padding: 8px 15px;
}

.logo-img { height: 36px; }

/* --- SEARCH --- */
.search-form {
    flex: 1;
    display: flex;
    margin-left: 20px;
}

.search-form input {
    flex: 1;
    padding: 6px 10px;
    border-radius: 20px;
}

.search-form button {
    margin-left: 5px;
    padding: 6px 12px;
    background: #00aaff;
    color: white;
    border-radius: 20px;
}

/* --- DOC CONTROLS --- */
.doc-controls { display: flex; gap: 10px; margin-left: 20px; }

.doc-controls button {
    background: #ffcc00;
    border-radius: 10px;
    padding: 6px 10px;
}

/* --- AVATAR --- */
.account-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
}

/* --- EDITOR --- */
.editor-container {
    margin: 20px auto;
    width: 90%;
    max-width: 900px;
    height: 70vh;
    background: rgba(255,255,255,0.95);
    border-radius: 12px;
    padding: 20px;
}

#docEditor {
    width: 100%;
    height: 100%;
    border: none;
    font-size: 16px;
}
</style>
</head>

<body class="slackey-regular">

<!-- TOP BAR -->
<div class="top-bar">
    <img src="./docs.png" class="logo-img">

    <form class="search-form">
        <input type="text" placeholder="Search Spoogle Docs" id="docSearch">
        <button type="button">🔍</button>
    </form>

    <div class="doc-controls">
        <button id="newDocBtn">New</button>
        <select id="docList"></select>
        <button id="saveBtn">Save</button>
    </div>

    <button id="loginBtn">Login</button>
    <img src="avatar.png" class="account-avatar" id="avatar">
</div>

<!-- EDITOR -->
<div class="editor-container">
    <textarea id="docEditor"></textarea>
</div>

<script>
// --- AVATAR SYSTEM ---
const loginBtn = document.getElementById("loginBtn");
const avatar = document.getElementById("avatar");

// ✅ YOUR AVATARS
const avatarOptions = [
    "Cheeks-avatar.png",
    "Spongebob-avatar.png",
    "Squidward-avatar.png",
    "Computer-lady-avatar.png",
    "Gary-avatar.png",
    "Krabs-avatar.png",
    "One celled organisim-avatar.png",
    "Patrick-avatar.png",
    "Puff-avatar.png",
    ""
];

let user = JSON.parse(localStorage.getItem("spoogleUser")) || null;

if(user){
    avatar.src = user.avatar || "avatar.png";
    loginBtn.textContent = user.name;
}

// Avatar picker
function chooseAvatar(){
    let avatarHTML = avatarOptions
        .filter(src => src !== "")
        .map((src,i) =>
        `<img src="${src}" data-index="${i}"
        style="width:60px;height:60px;margin:5px;cursor:pointer;border-radius:50%;">`
    ).join('');

    const popup = document.createElement('div');
    popup.innerHTML = `
        <div style="position:fixed;inset:0;background:rgba(0,0,0,0.7);
        display:flex;align-items:center;justify-content:center;">
            <div style="background:#fff;padding:20px;border-radius:12px;text-align:center;">
                <h3>Select Avatar</h3>
                ${avatarHTML}
                <br><br>
                <button id="cancelAvatar">Cancel</button>
            </div>
        </div>
    `;
    document.body.appendChild(popup);

    popup.querySelectorAll('img').forEach(img=>{
        img.onclick = ()=>{
            user.avatar = img.src;
            avatar.src = img.src;
            localStorage.setItem("spoogleUser", JSON.stringify(user));
            popup.remove();
        };
    });

    document.getElementById("cancelAvatar").onclick = ()=> popup.remove();
}

// Login
loginBtn.onclick = ()=>{
    const name = prompt("Username?");
    if(!name) return;

    user = { name, avatar: avatarOptions[0] };
    localStorage.setItem("spoogleUser", JSON.stringify(user));

    loginBtn.textContent = name;
    chooseAvatar();
};

// Change avatar
avatar.onclick = ()=>{
    if(user) chooseAvatar();
};

// --- DOC SYSTEM ---
let documents = JSON.parse(localStorage.getItem('spoogleDocs') || '{}');
let currentDoc = null;

const editor = document.getElementById('docEditor');
const docList = document.getElementById('docList');

function refreshDocs(){
    docList.innerHTML = "";
    Object.keys(documents).forEach(name=>{
        let opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        docList.appendChild(opt);
    });
}

document.getElementById('newDocBtn').onclick = ()=>{
    let name = prompt("Doc name?");
    if(!name) return;

    documents[name] = "";
    localStorage.setItem('spoogleDocs', JSON.stringify(documents));
    refreshDocs();
};

document.getElementById('saveBtn').onclick = ()=>{
    if(currentDoc){
        documents[currentDoc] = editor.value;
        localStorage.setItem('spoogleDocs', JSON.stringify(documents));
        alert("Saved!");
    }
};

docList.onchange = ()=>{
    currentDoc = docList.value;
    editor.value = documents[currentDoc] || "";
};

refreshDocs();
</script>

</body>
</html>
