<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spoogle Docs</title>

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Slackey&display=swap" rel="stylesheet">

<style>
body, input, button, select, textarea, h1, h2, h3, h4, h5, h6, p, div, span, label {
    font-family: "Slackey", sans-serif !important;
}
.slackey-regular { font-family: "Slackey", sans-serif; }

body {
    background: url("/background.jpg") no-repeat center center fixed;
    margin: 0;
}
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(255,255,0,0.15);
    z-index: 0;
}
body > * { position: relative; z-index: 1; }

.top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(90deg, #ffec00, #ffe000);
    padding: 10px;
}
.logo-img { height: 36px; }

.search-form { flex: 1; display: flex; margin: 0 15px; }
.search-form input {
    flex: 1; padding: 6px; border-radius: 20px; border: 1px solid #aaa;
}
.search-form button {
    margin-left: 5px; padding: 6px 12px; border-radius: 20px;
    border: none; background: #00aaff; color: white; cursor: pointer;
}

.doc-controls { display: flex; gap: 10px; }
.doc-controls button {
    background: #ffcc00; border-radius: 10px; padding: 6px 10px; border: none; cursor: pointer;
}

.account-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid white; cursor: pointer; }

.editor-container {
    margin: 20px auto;
    width: 90%; max-width: 900px; height: 70vh;
    background: rgba(255,255,255,0.95);
    border-radius: 12px; padding: 20px;
}
#docEditor { width: 100%; height: 100%; border: none; font-size: 16px; resize: none; outline: none; }

</style>
</head>

<body class="slackey-regular">

<div class="top-bar">
    <img src="/docs.png" class="logo-img">

    <form class="search-form">
        <input type="text" placeholder="Search Spoogle Docs" id="docSearch">
        <button type="button">🔍</button>
    </form>

    <div class="doc-controls">
        <button id="newDocBtn">New</button>
        <select id="docList"></select>
        <button id="saveBtn">Save</button>
    </div>

    <button id="loginBtn">ccc</button>
    <img src="/avatars/Cheeks-avatar.jpg" class="account-avatar" id="avatar">
</div>

<div class="editor-container">
    <textarea id="docEditor" placeholder="Start typing..."></textarea>
</div>

<script>
// AVATAR SYSTEM
const loginBtn = document.getElementById("loginBtn");
const avatar = document.getElementById("avatar");

const avatarOptions = [
    "/avatars/Cheeks-avatar.jpg",
    "/avatars/Spongebob-avatar.jpg",
    "/avatars/Squidward-avatar.jpg",
    "/avatars/Computer-lady-avatar.jpg",
    "/avatars/Gary-avatar.jpg",
    "/avatars/Krabs-avatar.jpg",
    "/avatars/One-celled-organisim-avatar.jpg",
    "/avatars/Patrick-avatar.jpg",
    "/avatars/Puff-avatar.jpg",
    ""
];

let user = JSON.parse(localStorage.getItem("spoogleUser")) || null;

if(user){
    avatar.src = user.avatar || "/avatars/Cheeks-avatar.jpg";
    loginBtn.textContent = user.name;
}

function chooseAvatar(){
    let avatarHTML = avatarOptions.filter(src => src !== "")
        .map(src => `<img src="${src}" 
        style="width:70px;height:70px;margin:6px;border-radius:50%;cursor:pointer;border:2px solid #ccc;">`)
        .join('');

    const popup = document.createElement("div");
    popup.innerHTML = `
        <div style="position:fixed;inset:0;background:rgba(0,0,0,0.7);
        display:flex;align-items:center;justify-content:center;z-index:9999;">
            <div style="background:white;padding:20px;border-radius:12px;text-align:center;">
                <h2>Select Your Avatar</h2>
                <div>${avatarHTML}</div>
                <br>
                <button id="closeAvatar">Cancel</button>
            </div>
        </div>
    `;
    document.body.appendChild(popup);

    popup.querySelectorAll("img").forEach(img=>{
        img.onclick = ()=>{
            user.avatar = img.getAttribute("src");
            avatar.src = user.avatar;
            localStorage.setItem("spoogleUser", JSON.stringify(user));
            popup.remove();
        };
    });

    document.getElementById("closeAvatar").onclick = ()=> popup.remove();
}

loginBtn.onclick = ()=>{
    const name = prompt("Enter username:");
    if(!name) return;

    user = { name, avatar: avatarOptions[0] };
    localStorage.setItem("spoogleUser", JSON.stringify(user));

    loginBtn.textContent = name;
    chooseAvatar();
};

avatar.onclick = ()=>{ if(user) chooseAvatar(); };

// DOC SYSTEM
let documents = JSON.parse(localStorage.getItem('spoogleDocs') || '{}');
let currentDoc = null;

const editor = document.getElementById('docEditor');
const docList = document.getElementById('docList');

function refreshDocs(){
    docList.innerHTML = "";
    Object.keys(documents).forEach(name=>{
        let opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        docList.appendChild(opt);
    });
}

document.getElementById('newDocBtn').onclick = ()=>{
    let name = prompt("Document name?");
    if(!name) return;

    documents[name] = "";
    localStorage.setItem('spoogleDocs', JSON.stringify(documents));
    refreshDocs();
};

document.getElementById('saveBtn').onclick = ()=>{
    if(currentDoc){
        documents[currentDoc] = editor.value;
        localStorage.setItem('spoogleDocs', JSON.stringify(documents));
        alert("Saved!");
    }
};

docList.onchange = ()=>{
    currentDoc = docList.value;
    editor.value = documents[currentDoc] || "";
};

refreshDocs();
</script>

</body>
</html>
