<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Some Time Later Font</title>

<style>
/* --- LOAD YOUR FONT --- */
@font-face {
    font-family: "Some Time Later";
    src: url("Some Time Later.woff") format("woff");
    font-weight: normal;
    font-style: normal;
}

/* --- APPLY FONT EVERYWHERE --- */
body, input, button, select, textarea, h1, h2, h3, h4, h5, h6, p, div, span, label {
    font-family: "Some Time Later", sans-serif !important;
}

/* --- BASIC STYLING --- */
body {
    background: #fffbe0;
    margin: 0;
    padding: 0;
}

.top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #ffec00;
    padding: 10px;
    border-bottom: 2px solid #f5d500;
}

.top-bar button {
    background: #00aaff;
    border: none;
    border-radius: 6px;
    padding: 6px 12px;
    color: white;
    cursor: pointer;
}

.editor-container {
    margin: 20px auto;
    width: 90%;
    max-width: 600px;
}

#docEditor {
    width: 100%;
    height: 200px;
    border: 2px solid #f5d500;
    border-radius: 12px;
    padding: 10px;
    font-size: 20px;
    background: #fff9d1;
    resize: none;
}
</style>
</head>

<body>
<div class="top-bar">
    <button>New Doc</button>
    <button>Save</button>
    <span>Avatar Placeholder</span>
</div>

<div class="editor-container">
    <textarea id="docEditor" placeholder="Start typing..."></textarea>
</div>

<p style="text-align:center; margin-top:20px;">
    This is a test of the <strong>Some Time Later</strong> font. Everything on this page should be using it!
</p>
</body>
</html>
